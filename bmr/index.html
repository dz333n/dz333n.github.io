<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Basal Metabolic Rate (BMR) Calculator" />
    <meta
      name="keywords"
      content="BMR, Basal Metabolic Rate, Metabolism, Calories"
    />
    <meta name="author" content="Yaroslav Kibysh" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZTNQPRF2ZD"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-ZTNQPRF2ZD");
    </script>

    <title>Basic BMR Calculator</title>

    <style>
      :root {
        --bg-color: #19171c;
        --primary: #6554af;
        --secondary: #e966a0;
        --text-color: #e1e0ff;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .calculator {
        width: 100%;
        max-width: 700px;
      }

      h1 {
        font-size: 40px;
        font-weight: 900;
        margin-bottom: 32px;
      }

      .glass {
        background: rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        padding: 28px;
        margin-bottom: 24px;
      }

      .form-group {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 0;
      }

      .form-group + .form-group {
        margin-top: 16px;
      }

      .form-group label {
        font-size: 15px;
        font-weight: 500;
        white-space: nowrap;
        min-width: 80px;
      }

      .form-group input {
        flex: 1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: var(--text-color);
        padding: 10px 16px;
        font-family: "Inter", sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        border-color: var(--primary);
      }

      .form-group input::placeholder {
        color: rgba(225, 224, 255, 0.3);
      }

      #result {
        margin-top: 24px;
      }

      .table {
        --bs-table-bg: transparent;
        --bs-table-color: var(--text-color);
        --bs-table-border-color: rgba(255, 255, 255, 0.06);
        font-size: 14px;
      }

      .table thead th {
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.5;
        border-bottom-color: rgba(255, 255, 255, 0.1);
        padding: 12px 16px;
      }

      .table td {
        padding: 8px 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-color);
        opacity: 0.4;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 24px;
        transition: opacity 0.2s;
      }

      .back-link:hover {
        opacity: 0.8;
        color: var(--text-color);
      }

      @media (max-width: 576px) {
        h1 {
          font-size: 28px;
        }

        .form-group {
          flex-direction: column;
          align-items: stretch;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <a class="back-link" href="https://yaroslavkibysh.com">&larr; Back</a>
      <h1>BMR Calculator</h1>

      <div class="glass">
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" value="21" />
        </div>

        <div class="form-group">
          <label for="centimeters">Height (cm)</label>
          <input
            type="number"
            id="centimeters"
            name="centimeters"
            step="0.01"
            placeholder="Enter height in cm"
            required
          />
        </div>
      </div>

      <div id="result" class="glass" style="display: none"></div>
    </div>

    <script src="bmr.js"></script>
  </body>
</html>
